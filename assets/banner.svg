    <circle cx="250" cy="40" r="1.5"/>
    <circle cx="350" cy="80" r="1.5"/>
    <circle cx="450" cy="30" r="1.5"/>
    <circle cx="550" cy="70" r="1.5"/>
    <circle cx="650" cy="50" r="1.5"/>
    <circle cx="750" cy="90" r="1.5"/>
    <circle cx="850" cy="40" r="1.5"/>
    <circle cx="950" cy="80" r="1.5"/>
    <circle cx="1050" cy="30" r="1.5"/>
    <circle cx="1150" cy="70" r="1.5"/>
    <circle cx="100" cy="250" r="1.5"/>
    <circle cx="200" cy="220" r="1.5"/>
    <circle cx="300" cy="260" r="1.5"/>
    <circle cx="400" cy="230" r="1.5"/>
    <circle cx="500" cy="270" r="1.5"/>
    <circle cx="600" cy="240" r="1.5"/>
    <circle cx="700" cy="260" r="1.5"/>
    <circle cx="800" cy="220" r="1.5"/>
    <circle cx="900" cy="270" r="1.5"/>
    <circle cx="1000" cy="240" r="1.5"/>
    <circle cx="1100" cy="250" r="1.5"/>

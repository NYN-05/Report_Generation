<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="16"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Grid dots -->
  <g fill="#38bdf8" opacity="0.07">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="150" cy="90" r="1.5"/>
    <circle cx="250" cy="40" r="1.5"/>
    <circle cx="350" cy="80" r="1.5"/>
    <circle cx="450" cy="30" r="1.5"/>
    <circle cx="550" cy="70" r="1.5"/>
    <circle cx="650" cy="50" r="1.5"/>
    <circle cx="750" cy="90" r="1.5"/>
    <circle cx="850" cy="40" r="1.5"/>
    <circle cx="950" cy="80" r="1.5"/>
    <circle cx="1050" cy="30" r="1.5"/>
    <circle cx="1150" cy="70" r="1.5"/>
    <circle cx="100" cy="250" r="1.5"/>
    <circle cx="200" cy="220" r="1.5"/>
    <circle cx="300" cy="260" r="1.5"/>
    <circle cx="400" cy="230" r="1.5"/>
    <circle cx="500" cy="270" r="1.5"/>
    <circle cx="600" cy="240" r="1.5"/>
    <circle cx="700" cy="260" r="1.5"/>
    <circle cx="800" cy="220" r="1.5"/>
    <circle cx="900" cy="270" r="1.5"/>
    <circle cx="1000" cy="240" r="1.5"/>
    <circle cx="1100" cy="250" r="1.5"/>
  </g>

  <!-- Icon: Document -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="40" height="50" rx="4" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <line x1="10" y1="16" x2="30" y2="16" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="24" x2="30" y2="24" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="32" x2="24" y2="32" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
    <rect x="28" y="36" width="8" height="8" rx="2" fill="#38bdf8" opacity="0.4"/>
  </g>

  <!-- Icon: Brain/Nodes -->
  <g transform="translate(160, 105)">
    <circle cx="20" cy="15" r="5" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="35" cy="25" r="5" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="15" cy="35" r="5" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="30" cy="45" r="5" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="20" y1="15" x2="35" y2="25" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="15" x2="15" y2="35" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="25" x2="30" y2="45" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="35" x2="30" y2="45" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Icon: Robot/Agent -->
  <g transform="translate(260, 110)">
    <rect x="8" y="20" width="24" height="20" rx="4" fill="none" stroke="#34d399" stroke-width="2"/>
    <rect x="14" y="8" width="12" height="12" rx="3" fill="none" stroke="#34d399" stroke-width="2"/>
    <circle cx="18" cy="16" r="1.5" fill="#34d399"/>
    <circle cx="26" cy="16" r="1.5" fill="#34d399"/>
    <line x1="12" y1="30" x2="16" y2="30" stroke="#34d399" stroke-width="1.5"/>
    <line x1="24" y1="30" x2="28" y2="30" stroke="#34d399" stroke-width="1.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="1">
    AI-Powered Report Generator
  </text>

  <text x="600" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="2">
    Knowledge-Driven Multi-Agent Document Generation Platform
  </text>

  <!-- Subtitle line -->
  <rect x="350" y="162" width="500" height="1" fill="url(#line)"/>

  <!-- Tags -->
  <g transform="translate(330, 190)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#38bdf8" opacity="0.15"/>
    <text x="45" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">Multi-Agent</text>

    <rect x="100" y="0" width="90" height="26" rx="13" fill="#818cf8" opacity="0.15"/>
    <text x="145" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">RAG Powered</text>

    <rect x="200" y="0" width="100" height="26" rx="13" fill="#34d399" opacity="0.15"/>
    <text x="250" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399">Evidence Driven</text>

    <rect x="310" y="0" width="90" height="26" rx="13" fill="#f59e0b" opacity="0.15"/>
    <text x="355" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#f59e0b">Knowledge Graph</text>

    <rect x="410" y="0" width="80" height="26" rx="13" fill="#f472b6" opacity="0.15"/>
    <text x="450" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#f472b6">DOCX + PDF</text>

    <rect x="500" y="0" width="100" height="26" rx="13" fill="#a78bfa" opacity="0.15"/>
    <text x="550" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">354+ Tests</text>
  </g>

  <!-- Pipeline footer -->
  <g transform="translate(0, 250)">
    <rect x="0" y="0" width="1200" height="50" fill="#0c1222" opacity="0.5"/>
    <text x="600" y="30" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">
      Topic → Plan → Research → Knowledge Graph → Fact Store → Generate → Review → Validate → Refine → Export
    </text>
  </g>
</svg>

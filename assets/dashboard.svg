    <rect x="555" y="170" width="210" height="8" rx="4" fill="#334155"/>
    <rect x="555" y="170" width="35" height="8" rx="4" fill="#ef4444"/>
    <text x="770" y="179" font-family="monospace" font-size="9" font-weight="bold" fill="#ef4444">0.17</text>

    <text x="425" y="200" font-family="monospace" font-size="9" fill="#94a3b8">Technical Depth</text>
    <rect x="555" y="190" width="210" height="8" rx="4" fill="#334155"/>

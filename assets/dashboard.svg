    <text x="617" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Validate</text>
    <rect x="665" y="0" width="60" height="22" rx="4" fill="#475569" opacity="0.3"/>
    <text x="695" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Export</text>
